<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상명님의 첫 웹사이트</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
      background: #f4f1ea;
      color: #2c2c2a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #ffffff;
      padding: 48px 40px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      text-align: center;
      max-width: 420px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      color: #0f6e56;
    }
    p {
      margin: 8px 0;
      line-height: 1.7;
      color: #5f5e5a;
    }
    .badge {
      display: inline-block;
      margin-top: 20px;
      padding: 6px 14px;
      background: #e1f5ee;
      color: #0f6e56;
      border-radius: 999px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>성공했어요! 🎉</h1>
    <p>이 페이지가 인터넷에 보인다면,<br>상명님은 방금 직접 만든 웹사이트를<br>전 세계에 띄운 거예요.</p>
    <p>GitHub Pages로 띄운 첫 번째 사이트입니다.</p>
    <span class="badge">GitHub 연습 완료</span>
  </div>
</body>
</html>
